apiVersion: 1

providers:
  - name: 'teslamate-zh-cn'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /dashboards

  - name: 'teslamate-internal'
    orgId: 1
    folder: 'Internal'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /dashboards_internal
